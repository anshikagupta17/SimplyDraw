<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>SimplyDraw</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="tools">

            <button id="Square">
                <img src="icons/square.png" alt="Square">
            </button>
            <button id="Rectangle">
                <img src="icons/rectangle.png" alt="Rectangle">
            </button>
            <button id="Circle">
                <img src="icons/circle.png" alt="Circle">
            </button>
            <button id="Triangle">
                <img src="icons/triangle.png" alt="Triangle">
            </button>
            <button id="Arrow">
                <img src="icons/arrow.png" alt="Arrow">
            </button>
            <button id="Line">
                <img src="icons/line.png" alt="Line">
            </button>

            <button id="Brush">
                <img src="icons/brush.png" alt="Brush">
            </button>
            <input type="range" id="Thickness" min="1" max="100" />
            <button id="Eraser">
                <img src="icons/eraser.png" alt="Eraser">
            </button>

            <button id="Image">
                <img src="icons/image.png" alt="Image">
            </button>

            <input type="color" id="Color" />

        </header>

        <main class="Workspace">
            <aside class="panel">
                <h2>Edit</h2>
                <section id="properties">
                </section>
            </aside>
            <section class="Canvas">
                <canvas id="Canvas" width="1200" height="600">
                </canvas>
            </section>
        </main>

    </body>
</html>
