<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>SimplyDraw</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="head">
            <div class="tools">
            <div id="Shapes">
                <button id="Square">
                    <img src="icons/square.png" alt="Square">
                </button>
                <button id="Rectangle">
                    <img src="icons/rectangle.png" alt="Rectangle">
               </button>
                <button id="Circle">
                    <img src="icons/circle.png" alt="Circle">
                </button>
                <button id="Triangle">
                    <img src="icons/triangle.png" alt="Triangle">
                </button>
                <button id="Line">
                    <img src="icons/line.png" alt="Line">
                </button>
            </div>
            <div>
                <button id="Brush">
                    <img src="icons/brush.png" alt="Brush">
                </button>
                <button id="Eraser">
                    <img src="icons/eraser.png" alt="Eraser">
                </button>
            </div>
            <button id="Image">
                <img src="icons/image.png" alt="Image">
            </button>
            <button id="textBox">
                <img src="icons/text.png" alt="TextBox">
            </button>
            <div class="clear">
            <button id="Bin">
                <img src="icons/bin.png" alt="Clear Screen">
            </button>
            <button id="Undo">
                <img src="icons/undo.png" alt="Undo">
            </button>
            <button id="Redo">
                <img src="icons/redo.png" alt="Redo">
            </button>
            </div>
            <div>
                <button class="mode">
                    <img src="icons/lightmode.png" alt="Light Mode">
                </button>
            </div>
            </div>

        </header>

        <main class="Workspace">
            <!-- creating side panel (i have made this comment cause it was confusing. It is not gpt generated :( ) -->
            <aside class="panel">
                <h2>Edit</h2>
                <div id="properties">
                </div>
            </aside>
            <section class="Canvas">
                <canvas id="Canvas" width="1600" height="800">
                </canvas>
            </section>
        </main>
        <div id="BrushCursor"></div>
        <script src="main.js">
        </script>
    </body>
</html>
